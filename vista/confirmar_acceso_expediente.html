<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirmar acceso</title>
    <style>
        body{
            font-family:Arial,sans-serif;
            background:#eef4fb;
            display:flex;
            align-items:center;
            justify-content:center;
            min-height:100vh;
            margin:0;
        }
        .card{
            background:#fff;
            padding:32px;
            border-radius:20px;
            width:100%;
            max-width:420px;
            box-shadow:0 12px 30px rgba(0,0,0,.08);
        }
        h1{
            margin-top:0;
        }
        input{
            width:100%;
            padding:12px;
            margin:12px 0 18px;
            border:1px solid #dbe5f2;
            border-radius:12px;
            box-sizing:border-box;
        }
        button{
            width:100%;
            padding:12px;
            border:none;
            border-radius:12px;
            background:#2f80ed;
            color:#fff;
            font-weight:bold;
            cursor:pointer;
        }
        .flash{
            margin-bottom:14px;
            padding:10px 12px;
            border-radius:10px;
            background:#fef2f2;
            color:#b91c1c;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Confirmar acceso</h1>
        <p>Ingresa tu contraseña para abrir este expediente.</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="flash">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST">
            <label for="password">Contraseña</label>
            <input type="password" name="password" id="password" required>
            <button type="submit">Confirmar y abrir expediente</button>
        </form>
    </div>
</body>
</html>
